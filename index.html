<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="McWestling is a family product company."
    >
    <meta name="theme-color" content="#f7f2e8" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#171716" media="(prefers-color-scheme: dark)">
    <title>McWestling</title>
    <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-touch-icon.png">
    <link rel="icon" href="favicons/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
    <link rel="manifest" href="favicons/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <main aria-label="McWestling landing page">
      <section class="masthead" aria-label="McWestling">
        <div class="brand">
          <h1 aria-label="McWestling">
            <span aria-hidden="true">Mc</span><span
              class="wordmark-westling"
              aria-hidden="true"
            >Westling</span>
          </h1>
        </div>
        <div class="castle-window-fill" aria-hidden="true">
          <span class="window-left-top"></span>
          <span class="window-left-bottom"></span>
          <span class="window-center-left"></span>
          <span class="window-center-right"></span>
          <span class="window-right-top"></span>
          <span class="window-right-bottom"></span>
        </div>
        <div class="logo-wrap">
          <img
            class="logo"
            src="assets/mcwestling-logo-window-cutouts.png"
            alt="McWestling castle logo"
            width="1024"
            height="1024"
          >
        </div>
        <div class="gigi-stage" aria-hidden="true"></div>
      </section>
      <section class="contact" aria-label="Contact links">
        <nav class="links" aria-label="McWestling links">
          <a href="mailto:inquiries@mcwestling.com">inquiries@mcwestling.com</a>
          <a href="https://github.com/mcwestling">GitHub</a>
        </nav>
      </section>
    </main>
  </body>
</html>
